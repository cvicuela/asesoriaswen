[build]
  publish = "."

# Redirige la raiz al archivo principal
[[redirects]]
  from = "/"
  to   = "/AsesoriaARo.html"
  status = 301
  force  = true

# Redirige index.html explícito también
[[redirects]]
  from = "/index.html"
  to   = "/AsesoriaARo.html"
  status = 301
  force  = true

# Security headers globales (respaldo adicional a _headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io"

# Configuración de Netlify Functions con esbuild
[functions]
  node_bundler = "esbuild"
